<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@attsapsa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans&display=swap');
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            text-align: center;
            background: linear-gradient(50deg, #b127f1, #b040f1, #8d16ee);
            font-family: 'Open Sans', sans-serif;
        }
        .container {
            text-align: left;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0d1117;
            color: #ffffff;
            width: 95vw;
            height: 89vh;
            overflow: hidden;
            display: flex;
            border-radius: 10px;
        }
        .sidebar,
        .content {
            padding: 12px;
        }
        .sidebar {
            text-align: center;
            background-color: #13191f;
            flex: 1;
        }
        .content {
            background-color: #0e1216;
            color: #a5a5a5;
            flex: 8;
        }
        .content div {
            margin: 0 15px;
        }
        .sidebar .item {
            display: block;
            padding: 10px;
            background-color: #1a2029;
            margin: 11px 5px;
            border-radius: 10px;
            text-decoration: none;
            color: #ffffff;
        }
        .sidebar .item:hover {
            cursor: pointer;
            background-color: #1c232c;
        }
        .photo {
            margin: auto;
            border-radius: 50%;
            background-color: #1c232c;
            background-image: url(https://avatars.githubusercontent.com/u/74890071?v=4);
            background-size: contain;
            background-repeat: no-repeat; 
            width: 125px;
            height: 125px;
        }
        #widget {
            display: none;
            text-align: center;
            position: absolute;
            bottom: 12px;
            right: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #1c232c;   
        }
        #widget:hover {
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                width: 90vw;
                height: 90vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="photo"></div>
            <p>Felipe Eliseu</p>
            <a class="item" href="#">Portfólio</a>
            <a class="item" href="#">Contato</a>
            <a class="item" href="#">Fotos</a>
        </div>
        <div class="content">
            <div>
                <p>nothing to see here - yet</p>
            </div>
            <div id="widget"></div>
        </div>
    </div>
</body>
</html>
